<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Задачи</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #0f3460;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; font-size: 2em; margin-bottom: 20px; color: #e94560; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        #taskInput {
            flex: 1; padding: 12px 16px; border: none; border-radius: 10px;
            background: #1a1a2e; color: #eee; font-size: 16px; outline: none;
        }
        #addBtn {
            padding: 12px 20px; border: none; border-radius: 10px;
            background: #e94560; color: #fff; font-size: 20px; cursor: pointer;
        }
        #addBtn:active { background: #ff6b81; }
        .task {
            display: flex; align-items: center; gap: 10px;
            padding: 12px; margin-bottom: 8px; background: #1a1a2e;
            border-radius: 10px;
        }
        .task.completed .task-text { text-decoration: line-through; color: #888; }
        .task-text { flex: 1; font-size: 16px; word-break: break-all; }
        .check-btn {
            width: 22px; height: 22px; border: 2px solid #e94560;
            border-radius: 50%; background: transparent; cursor: pointer;
        }
        .task.completed .check-btn { background: #e94560; }
        .delete-btn {
            background: transparent; border: none; color: #666;
            font-size: 18px; cursor: pointer; padding: 5px;
        }
        .delete-btn:active { color: #e94560; }
        .stats { text-align: center; margin-top: 20px; color: #888; font-size: 14px; }
        .status {
            text-align: center; margin-top: 5px; font-size: 12px;
            height: 20px;
        }
        .online { color: #4caf50; }
        .offline { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Задачи</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Новая задача..." maxlength="100">
            <button id="addBtn">+</button>
        </div>
        <div id="taskList"></div>
        <div class="status" id="syncStatus">🔄 Загрузка...</div>
        <div class="stats">
            <span id="totalTasks">0</span> задач · 
            <span id="doneTasks">0</span> выполнено · 
            👤 <span id="onlineCounter">1</span> в сети
        </div>
    </div>

    <script>
        const URL = 'https://pqkjdhurdqvwdckmemnr.supabase.co/rest/v1/tasks';
        const KEY = 'sb_publishable_ns-p7IgGcignqOUmenT94w_swlwhDl0';
        const headers = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' };

        const input = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const totalTasks = document.getElementById('totalTasks');
        const doneTasks = document.getElementById('doneTasks');
        const syncStatus = document.getElementById('syncStatus');
        const onlineCounter = document.getElementById('onlineCounter');

        let tasks = [];
        let ws = null;
        let onlineCount = 1;
        const userId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);

        // === ОНЛАЙН СЧЁТЧИК ===
        const bc = new BroadcastChannel('todo_online');
        const users = new Map();

        function heartbeat() {
            bc.postMessage({ type: 'ping', id: userId, time: Date.now() });
        }

        bc.onmessage = (e) => {
            const { type, id, time } = e.data;
            if (type === 'ping') {
                users.set(id, time);
                bc.postMessage({ type: 'pong', id: userId });
            }
            if (type === 'pong') {
                users.set(id, time);
            }
        };

        // Запрашиваем всех
        setInterval(() => {
            heartbeat();
            // Чистим старых (более 5 сек не отвечают)
            const now = Date.now();
            for (const [id, time] of users) {
                if (now - time > 5000) users.delete(id);
            }
            users.set(userId, now); // я точно онлайн
            onlineCount = users.size || 1;
            onlineCounter.textContent = onlineCount;
        }, 1500);

        // Ухожу
        window.addEventListener('beforeunload', () => {
            bc.postMessage({ type: 'leave', id: userId });
            if (ws) ws.close();
        });

        // === REALTIME ЧЕРЕЗ WEBSOCKET ===
        function connect() {
            const wsUrl = `wss://pqkjdhurdqvwdckmemnr.supabase.co/realtime/v1/websocket?apikey=${KEY}&vsn=1.0.0`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                syncStatus.textContent = '🟢 Онлайн';
                syncStatus.className = 'status online';
                ws.send(JSON.stringify({
                    topic: 'realtime:public:tasks',
                    event: 'phx_join',
                    payload: {},
                    ref: '1'
                }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.topic === 'realtime:public:tasks' && data.event === 'phx_reply') {
                    loadTasks(); // первая загрузка при подключении
                }
                if (data.payload?.data) {
                    loadTasks(); // изменение данных
                }
            };

            ws.onclose = () => {
                syncStatus.textContent = '🔴 Нет связи';
                syncStatus.className = 'status offline';
                setTimeout(connect, 1000);
            };

            ws.onerror = () => {
                syncStatus.textContent = '🔴 Ошибка';
                syncStatus.className = 'status offline';
            };
        }

        // === РАБОТА С ЗАДАЧАМИ ===
        async function loadTasks() {
            try {
                const res = await fetch(`${URL}?order=created_at.asc`, { headers });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                tasks = await res.json();
                syncStatus.textContent = '🟢 Онлайн';
                syncStatus.className = 'status online';
            } catch(e) {
                syncStatus.textContent = '🔴 Ошибка загрузки';
                syncStatus.className = 'status offline';
                tasks = [];
            }
            render();
        }

        function render() {
            taskList.innerHTML = '';
            let done = 0;
            tasks.forEach(t => {
                if (t.completed) done++;
                const div = document.createElement('div');
                div.className = 'task' + (t.completed ? ' completed' : '');
                div.innerHTML = `
                    <button class="check-btn" data-id="${t.id}"></button>
                    <span class="task-text">${t.text}</span>
                    <button class="delete-btn" data-id="${t.id}">✕</button>
                `;
                taskList.appendChild(div);
            });
            totalTasks.textContent = tasks.length;
            doneTasks.textContent = done;

            document.querySelectorAll('.check-btn').forEach(b => {
                b.onclick = () => toggle(b.dataset.id);
            });
            document.querySelectorAll('.delete-btn').forEach(b => {
                b.onclick = () => remove(b.dataset.id);
            });
        }

        async function add() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            // Оптимистично добавляем сразу
            const tempId = 'temp-' + Date.now();
            tasks.push({ id: tempId, text, completed: false });
            render();
            try {
                const res = await fetch(URL, { method: 'POST', headers, body: JSON.stringify({ text, completed: false }) });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                loadTasks(); // перезагружаем с сервера
            } catch(e) {
                syncStatus.textContent = '🔴 Ошибка сохранения';
                syncStatus.className = 'status offline';
                loadTasks();
            }
        }

        async function toggle(id) {
            const task = tasks.find(t => t.id == id);
            if (!task) return;
            // Оптимистично переключаем
            task.completed = !task.completed;
            render();
            try {
                await fetch(`${URL}?id=eq.${id}`, { method: 'PATCH', headers, body: JSON.stringify({ completed: task.completed }) });
            } catch(e) {
                task.completed = !task.completed;
                render();
            }
        }

        async function remove(id) {
            tasks = tasks.filter(t => t.id != id);
            render();
            try {
                await fetch(`${URL}?id=eq.${id}`, { method: 'DELETE', headers });
            } catch(e) {
                loadTasks();
            }
        }

        addBtn.addEventListener('click', add);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') add();
        });

        // Старт
        loadTasks();
        connect();
        heartbeat();
    </script>
</body>
</html>
